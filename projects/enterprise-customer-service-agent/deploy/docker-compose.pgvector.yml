services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: customer-agent-postgres
    environment:
      POSTGRES_DB: customer_agent
      POSTGRES_USER: customer_agent
      POSTGRES_PASSWORD: customer_agent_dev
    ports:
      - "15432:5432"
    volumes:
      - customer-agent-postgres-18-data:/var/lib/postgresql
      - ./sql/001_init_pgvector.sql:/docker-entrypoint-initdb.d/001_init_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer_agent -d customer_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: customer-agent-redis
    ports:
      - "16379:6379"
    volumes:
      - customer-agent-redis-8-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  customer-agent-postgres-18-data:
  customer-agent-redis-8-data:
