server:
  port: 8080

springdotenv:
  directory: ..
  filename: .env
  ignore-if-missing: true

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:projects/enterprise-customer-service-agent/.env[.properties]
  application:
    name: customer-agent-app
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/customer_agent}
    username: ${SPRING_DATASOURCE_USERNAME:customer_agent}
    password: ${SPRING_DATASOURCE_PASSWORD:customer_agent_dev}
  ai:
    model:
      audio:
        speech: none
        transcription: none
      chat: ${SPRING_AI_MODEL_CHAT:none}
      embedding: ${SPRING_AI_MODEL_EMBEDDING:none}
      image: none
      moderation: none
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:}
      chat:
        api-key: ${CUSTOMER_AGENT_CHAT_OPENAI_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}
        base-url: ${CUSTOMER_AGENT_CHAT_OPENAI_BASE_URL:${SPRING_AI_OPENAI_BASE_URL:https://api.deepseek.com}}
        model: ${CUSTOMER_AGENT_CHAT_OPENAI_MODEL:${SPRING_AI_OPENAI_CHAT_MODEL:deepseek-v4-flash}}
        temperature: ${CUSTOMER_AGENT_CHAT_OPENAI_TEMPERATURE:${SPRING_AI_OPENAI_CHAT_TEMPERATURE:0.2}}
      embedding:
        api-key: ${CUSTOMER_AGENT_EMBEDDING_OPENAI_API_KEY:${SPRING_AI_OPENAI_EMBEDDING_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}}
        base-url: ${CUSTOMER_AGENT_EMBEDDING_OPENAI_BASE_URL:${SPRING_AI_OPENAI_EMBEDDING_BASE_URL:${SPRING_AI_OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}}}
        model: ${CUSTOMER_AGENT_EMBEDDING_OPENAI_MODEL:${SPRING_AI_OPENAI_EMBEDDING_MODEL:text-embedding-v4}}
        dimensions: ${CUSTOMER_AGENT_EMBEDDING_DIMENSIONS:${CUSTOMER_AGENT_PGVECTOR_DIMENSIONS:1536}}
    vectorstore:
      pgvector:
        initialize-schema: false
        schema-name: public
        table-name: customer_knowledge_vectors
        dimensions: ${CUSTOMER_AGENT_PGVECTOR_DIMENSIONS:1536}
        distance-type: COSINE_DISTANCE
        index-type: HNSW

customer-agent:
  default-order-id: order-1001
  trace-id-prefix: trace
  chat-model:
    enabled: ${CUSTOMER_AGENT_CHAT_MODEL_ENABLED:false}
  mcp-client:
    mode: ${CUSTOMER_AGENT_MCP_CLIENT_MODE:stdio}
    command: ${CUSTOMER_AGENT_MCP_CLIENT_COMMAND:java}
    server-jar: ${CUSTOMER_AGENT_MCP_CLIENT_SERVER_JAR:../customer-mcp-server/target/customer-mcp-server-0.1.0-SNAPSHOT.jar}
    request-timeout-seconds: ${CUSTOMER_AGENT_MCP_CLIENT_REQUEST_TIMEOUT_SECONDS:10}
  knowledge-base:
    embedding-mode: ${CUSTOMER_AGENT_KNOWLEDGE_EMBEDDING_MODE:local}
    vector-store-type: ${CUSTOMER_AGENT_KNOWLEDGE_VECTOR_STORE_TYPE:simple}
    root-directory: ${CUSTOMER_AGENT_KNOWLEDGE_BASE_ROOT:../knowledge-base}
    default-tenant-id: default
    top-k: 3
